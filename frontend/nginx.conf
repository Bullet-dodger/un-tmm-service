server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── SPA routing ──────────────────────────────────────────────
    # All unknown paths return index.html so react-router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy ────────────────────────────────────────────────
    # Forward /api/* to the Spring Boot backend container.
    # The full URI (including /api/) is forwarded as-is.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow large request bodies (e.g. calculation payloads)
        client_max_body_size 10m;
    }
}
