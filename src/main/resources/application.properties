spring.application.name=un-tmm-service

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/tmm_db
spring.datasource.username=tmm_user
spring.datasource.password=tmm_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# Liquibase disabled — using data.sql instead
spring.liquibase.enabled=false

# Load data.sql after Hibernate creates tables
spring.sql.init.mode=always

# Pagination defaults
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100
